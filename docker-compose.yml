version: "3.9"

services:
  api:
    build: .
    container_name: callmood-api
    env_file: .env
    environment:
      PYTHONPATH: /app/src/backend:/app/src/engine:/app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    container_name: callmood-worker
    env_file: .env
    environment:
      PYTHONPATH: /app/src/backend:/app/src/engine:/app
    command: rq worker -u ${REDIS_URL} callmood
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: callmood-redis
    ports:
      - "6379:6379"

volumes:
  storage:
  artifacts:
